<defs>
  <!-- 定义全局同步的动态渐变 -->
  <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#00F5FF">
      <animate attributeName="stop-color" values="#00F5FF;#7B2FFF;#FF00C8;#00F5FF" dur="4s" repeatCount="indefinite"></animate>
    </stop>
    <stop offset="50%" stop-color="#7B2FFF">
      <animate attributeName="stop-color" values="#7B2FFF;#FF00C8;#00F5FF;#7B2FFF" dur="4s" repeatCount="indefinite"></animate>
    </stop>
    <stop offset="100%" stop-color="#FF00C8">
      <animate attributeName="stop-color" values="#FF00C8;#00F5FF;#7B2FFF;#FF00C8" dur="4s" repeatCount="indefinite"></animate>
    </stop>
  </linearGradient>

  <!-- 定义发光滤镜：仅用于底层 -->
  <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
    <feGaussianBlur stdDeviation="8" result="blur"></feGaussianBlur>
    <feComposite in="blur" in2="SourceGraphic" operator="over"></feComposite>
  </filter>
</defs>

